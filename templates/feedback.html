
{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Give Feedback</h1>
    <p>We value your opinion. Let us know how we're doing.</p>
</div>

<div class="form-container">
    <h2 class="form-title">Customer Feedback Form</h2>
    <form action="/feedback" method="POST">
        <div class="form-group">
            <label for="name">Your Name / Organization</label>
            <input type="text" id="name" name="name" class="form-control" required
                placeholder="Enter your name">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required
                placeholder="Enter your email address">
        </div>

        <div class="form-group">
            <label>Rating</label>
            <div class="rating-stars">
                <input type="radio" name="rating" value="5" id="star5" required checked><label for="star5" title="Amazing"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="4" id="star4"><label for="star4" title="Good"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="3" id="star3"><label for="star3" title="Average"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="2" id="star2"><label for="star2" title="Poor"><i class="fa-solid fa-star"></i></label>
                <input type="radio" name="rating" value="1" id="star1"><label for="star1" title="Very Bad"><i class="fa-solid fa-star"></i></label>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">Select a star rating from 1 to 5.</p>
        </div>

        <div class="form-group">
            <label for="comment">Your Comments</label>
            <textarea id="comment" name="comment" class="form-control" required
                placeholder="Share your experience with us..."></textarea>
        </div>

        <!-- Feedback Alert Area -->
        <div id="form-feedback" style="display: none; margin-bottom: 20px; padding: 15px; border-radius: 12px; font-weight: 500;"></div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary btn-block">Submit Feedback</button>
        </div>
    </form>
</div>

<style>
    .rating-stars {
        display: flex;
        flex-direction: row-reverse;
        justify-content: flex-end;
        gap: 10px;
    }
    
    .rating-stars input {
        display: none;
    }
    
    .rating-stars label {
        font-size: 2.8rem;
        color: #ddd;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        padding: 5px;
    }
    
    .rating-stars label:hover,
    .rating-stars label:hover ~ label,
    .rating-stars input:checked ~ label {
        color: #ffc107;
        transform: scale(1.1);
    }
    
    .rating-stars label:active {
        transform: scale(0.9);
    }

    @media (max-width: 768px) {
        .rating-stars {
            justify-content: center;
            gap: 15px;
        }
        .rating-stars label {
            font-size: 2.5rem;
        }
    }
</style>
{% endblock %}
