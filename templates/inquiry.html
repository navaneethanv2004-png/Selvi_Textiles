{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>Request a Quote</h1>
    <p>Fill out the form below to receive pricing for our medical textiles.</p>
</div>

<div class="form-container">
    <h2 class="form-title">Inquiry / Order Form</h2>
    <form action="/inquiry" method="POST">
        <div class="form-group">
            <label for="name">Contact Name / Hospital Name</label>
            <input type="text" id="name" name="name" class="form-control" required
                placeholder="Enter your name or hospital name">
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" required
                placeholder="Enter your phone number (e.g. +91 89408 96918)">
        </div>

        <div class="form-group">
            <label>Select Product(s) <span style="font-weight: normal; color: var(--text-muted); font-size: 0.85rem;">(Choose one or more)</span></label>
            <div class="checkbox-group">
                {% for p in products %}
                <label class="checkbox-item">
                    <input type="checkbox" name="product" value="{{ p.name }}" 
                        {% if p.name == product_name %}checked{% endif %}>
                    {{ p.name }}
                </label>
                {% endfor %}
                <label class="checkbox-item">
                    <input type="checkbox" name="product" value="Other Medical Textiles">
                    Other Medical Textiles
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="quantity">Estimated Quantity</label>
            <input type="text" id="quantity" name="quantity" class="form-control"
                placeholder="e.g., 500 Rolls, 1000 Pieces" required>
        </div>

        <div class="form-group">
            <label for="message">Additional Details (Optional)</label>
            <textarea id="message" name="message" class="form-control"
                placeholder="Specify requirements, preferred delivery date, etc."></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 1rem; flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary" style="flex: 1; min-width: 150px;">Submit Inquiry</button>
            <button type="button" id="whatsapp-btn" class="btn" style="flex: 1; min-width: 150px; background: #25D366; color: white; border: none; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fa-brands fa-whatsapp" style="font-size: 1.2rem;"></i> Send on WhatsApp
            </button>
        </div>
    </form>
</div>

<script>
document.getElementById('whatsapp-btn').addEventListener('click', function() {
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const products = Array.from(document.querySelectorAll('input[name="product"]:checked')).map(cb => cb.value);
    const quantity = document.getElementById('quantity').value;
    const message = document.getElementById('message').value;

    if (!name || !phone || products.length === 0 || !quantity) {
        showFlash('Please fill in all required fields first.', 'error');
        return;
    }

    const businessPhone = '918940896918'; // Target admin phone number
    const text = `*New Inquiry from Selvi Textiles Website*%0A%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*Products:* ${products.join(', ')}%0A*Quantity:* ${quantity}%0A*Message:* ${message}`;
    
    window.open(`https://wa.me/${businessPhone}?text=${text}`, '_blank');
});
</script>
{% endblock %}
